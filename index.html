<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/logo.pinta.png" type="image/x-icon" />

    <title>login.html</title>
</head>
<body>  
    <div class="flex-login"> 
        <main class="main-login">
            <section> 
                <img class="logo-login" src="img/logo.transparente.png" alt="Logo de Pinta">
                <div class="welcome-section">
                    <h1 class="welcome-title">Bienvenido coñito</h1> 
                </div>

                <form class="login-form">

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control" placeholder="Nombre de usuario">
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" class="form-control" placeholder="Contraseña">
                    </div>

                    <button type="submit" class="btn btn-warning w-100">
                        Iniciar sesión
                    </button>

                </form>

                <div class="content-register-1">
                    <p>¿Primera vez?</p>
                    <a href="register.html" class="colour register">Regístrarse</a>
                </div>
                <div>
                    <hr class="line-size">
                </div>
                <p class="content-register-2">Al iniciar sesión aceptas nuestras <a href="privacy-policy.html" class="content-register-3">Políticas de privacidad</a></p>
            </section>
        </main>
    </div> 
    <footer class="main-footer">
        <p>Pinta, Inc ⓒ 2026 <a href="https://opensource.org/license/MIT">MIT License</a> </p>
    </footer>
</body>
</html>
