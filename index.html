<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login.html</title>
</head>
<body>  
    <div class="flex-login"> <!-- hacer la adaptacion a celular -->
        <main class="main-login">
            <section> 
                <img class="logo-login" src="img/logo.transparente.png" alt="Logo de Pinta">
                <div class="welcome-section">
                <h1 class="welcome-title">Bienvenido coñito</h1> <!-- se cambia el mensaje de bienvenida y se crea una clases para modificarlo -->  
            

                <form class="login-form" action="">
                    <input type="text" placeholder="Nombre de usuario">
                    <input type="password" placeholder="Contraseña">
                    <div>
                        <hr>
                    </div>
                    <button type="submit">iniciar sesion</button>
                </form>
                <div class="content-register-1">
                    <p>¿Primera vez?</p>
                    <a href="register.html">Regístrarse</a>
                </div>
                <div>
                    <hr>
                </div>
                <p class="content-register-2">Al iniciar sesión aceptas nuestras <a href="privacy-policy.html" class="content-register-3">Políticas de privacidad</a></p>
            </section>
        </main>
    </div> <!-- se cierra el div de flex-login -->
    <footer class="main-footer">
        <p>Pinta, Inc ⓒ 2026 <a href="https://opensource.org/license/MIT">MIT License</a> </p>
    </footer>
</body>
</html>
