<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinta</title>
    <link rel="icon" href="img/logo.pinta11.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://kit.fontawesome.com/9d24d76722.js" crossorigin="anonymous"></script>
  </head>

  <body>
    <div class="feed-grid">
        <header>
            <h1 class="title" >PINTA</h1>   
            <!-- BUSCADOR -->
             <div class="search-post">
                <input type="text" placeholder="Buscar..." />
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <a href="profile.html" class="profile-link">
                <img src="img/avatar.pinta1111.png" alt="Avatar perfil" />
            </a>
        </header>

      <!-- POSTS -->
        <aside>
            <nav class="navbar">
                <div class="nav-top">
                    <a href="feed.html" class="inicio"><i class="fa-regular fa-house"></i>Inicio</a>
                    <a href="search-profile.html" class="buscar-usuario"><i class="fa-solid fa-magnifying-glass-plus"></i>Buscar Usuarios</a>
                    <a href="create-post.html" class="crear-post"><i class="fa-solid fa-circle-plus"></i>Crear Post</a>
                </div>
                <div class="nav-bottom">
                    <a href="privacy-policy.html" class="politica-uso"><i class="fa-regular fa-file-lines"></i>Política de uso</a>
                    <a href="" class="cerrar-sesion"><i class="fa-solid fa-right-from-bracket"></i>Cerrar sesión</a>
                </div>
           </nav>
        </aside> 

        <main>
            <div class="feed-header">
                <button class="todos">Todos</button>
                <button class="siguiendo">Siguiendo</button>
            </div>

            <article class="post">
                <!-- HEADER DEL POST -->
                <div class="post-user">
                    <div class="post-user-left">
                        <img src="img/avatar.pinta1111.png" alt="imagen de Usuario" />
                        <h2>Abdias</h2>
                    </div>
                    <div class="post-user-right">
                        <button class="follow-btn">Seguir</button>
                        <div class="dropdown"><i class="fa-solid fa-bars"></i>
                        </div>
                    </div>
                </div>
                
                <div class="post-card">
                    <!-- TITULO -->
                    <h2>Nueva skin gratis</h2>
                    <!-- Descripcion-->
                    <p>vieron la nueva skin que salio en mobile lenges</p>
                    <!-- IMAGEN -->
                    <img src="img/placeholder-img.png" alt="Publicación" />
                </div>
    
                <div class="post-footer">
                    <div class="post-reactions">
                        <button>👍 1</button>
                        <button>👎 2</button>
                        <button>💬 4 comentarios</button>
                        <h4>Mobile lenges</h4>
                    </div>         
                </div>
            </article>
        </main>

        <footer>
            <p>
                <a href="https://opensource.org/license/MIT">Pinta, Inc ⓒ 2026 MIT License</a>
            </p>
        </footer>
    </div>
  </body>
</html>
