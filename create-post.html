<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="img/logo.pinta11.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/9d24d76722.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="grid">
        <header class="title-header-center">
            <h1 class="title-header" >PINTA</h1>   
        </header>
  
        <aside>
            <nav class="navbar-aside">
                <div class="nav-top-aside">
                    <a href="feed.html">
                        <i class="fa-regular fa-house"></i>
                        <span class="desktop-text-aside">Inicio</span>
                        <span class="mobile-text-aside">Inicio</span>
                    </a>

                    <a href="search-profile.html">
                        <i class="fa-solid fa-magnifying-glass-plus"></i>
                        <span class="desktop-text-aside">Buscar Usuarios</span>
                        <span class="mobile-text-aside">Buscar</span>
                    </a>
                </div>
                <div class="mobile-only-aside">
                    <a href="profile.html" class="profile profile-mobile">
                        <img src="img/avatar.pinta1111.png" alt="Avatar perfil">
                        <span class="mobile-text-aside">Perfil</span>
                    </a>
                </div>

                <div class="nav-bottom-aside">
                    <a href="privacy-policy.html">
                         <i class="fa-regular fa-file-lines"></i>
                         <span class="desktop-text-aside">Política de uso</span>
                         <span class="mobile-text-aside">Política</span>
                    </a>
                    <a href="#">
                         <i class="fa-solid fa-right-from-bracket"></i>
                         <span class="desktop-text-aside">Cerrar sesión</span>
                         <span class="mobile-text-aside">Salir</span>
                    </a>
                </div>
                
           </nav>
        </aside> 

        <main>
            <section class="create-post">
                <h1 class="section-title">Crear Post</h1>
                <div class="post-author">
                    <img src="" alt="profile picture" class="author-avatar">
                    <span class="author-name">Nombre de usuario</span>
               </div>
               <hr class="divider">
               <form class="post-form">

                <input type="text" class="post-title" name="post-title" placeholder="Titulo" maxlength="300">

                <span class="char-counter">0/300</span>

                <label class="upload-box">

                    <span class="upload-text">Subir imagen</span>

                    <input type="file" class="post-image" name="post-image" accept="image/*">

                </label>

                <textarea class="post-content" name="post-content" placeholder="Descripcion del post"></textarea>

                <input type="text" class="game-name" placeholder="Nombre del juego">

                <input type="text" class="game-genre" placeholder="Género">

                <button type="submit" class="submit-button">Crear Post</button>

                </form>

            </section>      
        </main>

        <footer>
            <p>
                <a href="https://opensource.org/license/MIT">Pinta, Inc ⓒ 2026 MIT License</a>
            </p>
        </footer>
    </div>
</body>
</html>
