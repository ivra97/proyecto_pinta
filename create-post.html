<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pinta - Crear Publicacion</title>
    <link rel="icon" href="img/logo.pinta.png" type="image/x-icon" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet" />
    <script src="https://kit.fontawesome.com/9d24d76722.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="grid-container grid-container--create-post">
        <header class="main-header  main-header--create-post">
            <h1 class="title-header">PINTA</h1>
        </header>

        <aside class="asidebar asidebar--create-post">
            <nav class="navbar-aside sidebar-nav">
                <div class="nav-top-aside nav-top">
                    <a href="feed.html">
                        <i class="fa-regular fa-house"></i>
                        <span class="desktop-text-aside">Inicio</span>
                    </a>

                    <a href="search-profile.html">
                        <i class="fa-solid fa-magnifying-glass-plus"></i>
                        <span class="desktop-text-aside">Buscar Usuarios</span>
                    </a>

                    <a href="create-post.html" class="active">
                        <i class="fa-solid fa-circle-plus"></i>
                        <span class="desktop-text-aside">Crear Post</span>
                    </a>
                </div>

                <hr>

                <div class="nav-bottom-aside nav-bottom">
                    <a href="privacy-policy.html">
                        <i class="fa-regular fa-file-lines"></i>
                        <span class="desktop-text-aside">Politica de uso</span>
                    </a>
                    <a href="#">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span class="desktop-text-aside">Cerrar sesion</span>
                    </a>
                </div>
            </nav>
        </aside>

        <main class="main-content main-content--create-post">
            <div class="create-post-container">
                <div class="create-post-header">
                    <a href="profile.html" class="back-button-header ">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    <h2>Crear Publicacion</h2>
                </div>

                <form class="create-post-form">
                    <div class="form-group">
                        <label for="title">Titulo</label>
                        <input
                            type="text"
                            id="title"
                            name="title"
                            maxlength="50"
                            placeholder="Ingrese un titulo"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="image">Imagen</label>
                        <input
                            type="file"
                            id="image-upload"
                            name="image"
                            accept="image/*">
                    </div>

                    <div class="form-group">
                        <label for="description">Descripcion</label>
                        <textarea
                            id="description"
                            name="description"
                            maxlength="500"
                            rows="6"
                            placeholder="Ingrese una descripcion"
                            required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="game-name">Nombre del juego</label>
                        <input
                            type="text"
                            id="game-name"
                            name="game-name"
                            maxlength="50"
                            placeholder="Ingrese el nombre del juego"
                            required>
                    </div>

                    <button type="submit" class="publish-button">
                        Publicar
                    </button>
                </form>
            </div>
        </main>

        <footer class="main-footer main-footer--create-post">
            <p>
                <a href="https://opensource.org/license/MIT">Pinta, Inc ⓒ 2026 MIT License</a>
            </p>
        </footer>
    </div>
</body>
</html>
